# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude used for code review, architectural discussion, and development workflow.
  No candidate data was fed to any LLM during the ranking step.
  The ranking pipeline runs entirely offline with local rule-based scoring and
  optional sentence-transformers embedding (all-MiniLM-L6-v2, runs on CPU).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid multi-signal ranking pipeline in two stages:

  Stage 1 — Rule-based scoring for all 100K candidates (< 25s on CPU):
    - Skills match (0.28): Weighted overlap of required/nice-to-have skills with
      proficiency and duration-months as trust multipliers to defeat keyword stuffers
    - Title/Role relevance (0.22): Pattern-matched against 30+ title archetypes
      (weighted 70% current + 30% best historical)
    - Career trajectory (0.18): Product vs. consulting company ratio, production ML
      signals in descriptions, career arc and tenure analysis
    - Behavioral signals (0.14): open_to_work flag, last-active recency, recruiter
      response rate, notice period, GitHub activity score
    - Experience fit (0.13): Bell-curve peaking at JD sweet spot of 6-8 years
      multiplied by domain relevance ratio
    - Education prestige (0.05): Institution tier × degree level × STEM field

  Stage 2 — Semantic similarity (optional, < 10s): Sentence-transformers
  all-MiniLM-L6-v2 applied to top-3000 rule-scored candidates only.

  Final score = weighted_sum × behavioral_multiplier × (1 - honeypot_penalty)
  where behavioral_multiplier down-weights inactive/unresponsive candidates and
  honeypot_penalty flags impossible profiles (expert skills with 0 duration months,
  claimed years of experience >> verifiable career history).

  Key design decisions from JD hints: keyword stuffing is explicitly penalized,
  consulting-only careers receive trajectory penalty, non-NLP domains are
  down-weighted, and a perfect-on-paper candidate who is behaviorally unavailable
  is ranked lower than a slightly weaker but actively engaged candidate.

